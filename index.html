<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blue Fire Ijen Travel Platform | Airbnb Style Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  background:#f8fafc;
  color:#0f172a;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-between;
  padding:14px 8%;
  border-bottom:1px solid #e5e7eb;
  z-index:1000;
}

nav h1{color:#0ea5e9;font-size:18px}

/* HERO */
.hero{
  padding:140px 8% 60px;
  text-align:center;
  background:linear-gradient(180deg,#e0f2fe,white);
}

.hero h2{font-size:48px}
.hero p{max-width:700px;margin:10px auto;color:#475569}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:40px 8%;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #e5e7eb;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:16px;
}

.price{
  color:#0ea5e9;
  font-weight:700;
  margin-top:8px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#0ea5e9;
  color:white;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

/* REVIEW */
.review{
  padding:40px 8%;
  background:white;
}

.review-box{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.review-card{
  padding:16px;
  border:1px solid #e5e7eb;
  border-radius:12px;
}

/* WA */
.wa{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h1>Blue Fire Travel</h1>
</nav>

<!-- HERO -->
<div class="hero">
  <h2>Explore East Java Like Airbnb Experience</h2>
  <p>Booking trip ke Ijen, Bromo, dan Tumpak Sewu dengan sistem modern & fleksibel.</p>
</div>

<!-- DESTINATIONS -->
<div class="grid" id="list"></div>

<!-- REVIEW -->
<div class="review">
<h3 style="padding:0 8%;">Customer Reviews</h3>
<div class="review-box">

<div class="review-card">★★★★★ <br>"Ijen trip amazing!"</div>
<div class="review-card">★★★★★ <br>"Bromo sunrise perfect"</div>
<div class="review-card">★★★★★ <br>"Best travel in Java"</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="title"></h3>
    <p id="desc"></p>
    <input id="name" placeholder="Nama">
    <input id="date" type="date">
    <input id="people" type="number" placeholder="Jumlah Peserta">
    <button onclick="bookNow()">Book via WhatsApp</button>
    <button onclick="closeModal()" style="background:#ef4444;">Close</button>
  </div>
</div>

<a class="wa" href="https://wa.me/6281235683044">WA</a>

<script>

const data = [
{
title:"Kawah Ijen Blue Fire",
desc:"Fenomena api biru alami + crater lake",
price:"Rp 750.000",
img:"https://images.unsplash.com/photo-1528127269322-539801943592"
},
{
title:"Gunung Bromo Sunrise",
desc:"Sunrise terbaik di Indonesia",
price:"Rp 1.200.000",
img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
},
{
title:"Tumpak Sewu Waterfall",
desc:"Air terjun Niagara Indonesia",
price:"Rp 1.500.000",
img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470"
}
];

let selected="";

function render(){
let html="";
data.forEach((d,i)=>{
html+=`
<div class="card" onclick="openModal(${i})">
<img src="${d.img}">
<div class="card-content">
<h3>${d.title}</h3>
<p>${d.desc}</p>
<div class="price">${d.price}</div>
</div>
</div>`;
});
document.getElementById("list").innerHTML=html;
}

function openModal(i){
selected=data[i];
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=selected.title;
document.getElementById("desc").innerText=selected.desc;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function bookNow(){
let name=document.getElementById("name").value;
let date=document.getElementById("date").value;
let people=document.getElementById("people").value;

let msg=`Booking Travel

Trip: ${selected.title}
Nama: ${name}
Tanggal: ${date}
Peserta: ${people}`;

window.open("https://wa.me/6281235683044?text="+encodeURIComponent(msg));
}

render();

</script>

</body>
</html>
